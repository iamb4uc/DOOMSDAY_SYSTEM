name: check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpam0g-dev \
            libx11-dev \
            libxext-dev \
            libxft-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            mandoc \
            ncurses-bin \
            pkg-config \
            shellcheck

      - name: Check
        run: make check

      - name: Smoke
        run: make smoke

      - name: Modules
        run: make modules
